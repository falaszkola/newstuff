<!DOCTYPE html>
<html lang="pl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="keywords" content="grid responsywność">
<meta name="description" content="Tabela dopasowuje sie do szerokości ekranu.">
<title>Responsywna tabela</title>
<style>
    /* telefon */
    .kontener-grida {grid-template-columns: auto auto auto auto auto; margin: 100px ;}
    .lp {grid-row: span 2;}
    .rej {grid-column: span 1;}
    .model {grid-column: span 3;} 
    .kol {grid-column: span 1;}
    .dl {grid-column: span 1;}
    .szer {grid-column: span 1;}     
    .wys {grid-column: span 1;}
    .kontener-grida {display: grid;grid-gap: 1px;background-color:#51ff00;padding: 1px; margin: 100px ;}
    .kontener-grida > div {background-color: rgb(255, 255, 255);padding: 10px; color:#51ff00}
    /* wszyscy */

    /* komputery */
@media only screen and (min-width: 1200px) {
    .kontener-grida {grid-template-columns: auto auto auto auto auto auto auto;}
    .lp {grid-row: span 1;}
    .rej {grid-column: span 1;}
    .model {grid-column: span 1;} 
    .kol {grid-column: span 1;}
    .dl {grid-column: span 1;}
    .szer {grid-column: span 1;}     
    .wys {grid-column: span 1;}
    .kontener-grida {display: grid;grid-gap: 1px;background-color:#adadad;padding: 1px; margin: 100px ;}
    .kontener-grida > div {background-color: rgb(255, 255, 255);padding: 10px; color:#000000}
    }
</style>
</head>
